<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: var(--figma-color-bg, #fff);
        --bg-secondary: var(--figma-color-bg-secondary, #f5f5f5);
        --text: var(--figma-color-text, #111);
        --text-secondary: var(--figma-color-text-secondary, #666);
        --border: var(--figma-color-border, #e5e5e5);
        --accent: var(--figma-color-bg-brand, #0d99ff);
        --accent-text: var(--figma-color-text-onbrand, #fff);
        --danger: var(--figma-color-bg-danger, #f24822);
        --success: var(--figma-color-bg-success, #14ae5c);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        font-size: 12px;
        line-height: 1.4;
        color: var(--text);
        background: var(--bg);
      }
      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- UI_SCRIPT -->
  </body>
</html>
